version: 0.2

env:
  variables:
    MAVEN_HOME: "/opt/maven"
    PATH: "/opt/maven/bin:$PATH"

phases:
  install:
    runtime-versions:
      java: corretto17
    commands:
      - echo "📦 Maven 다운로드 중..."
      - curl -sL https://downloads.apache.org/maven/maven-3/3.9.6/binaries/apache-maven-3.9.6-bin.tar.gz | tar -xz
      - mv apache-maven-3.9.6 $MAVEN_HOME
      - echo "✅ Maven 설치 완료"
      - $MAVEN_HOME/bin/mvn -version

  build:
    commands:
      - echo "🚀 프로젝트 빌드 시작!"
      - $MAVEN_HOME/bin/mvn clean package

artifacts:
  files:
    - target/*.war
  discard-paths: yes
