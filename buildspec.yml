version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17
    commands:
      - echo "📦 Maven 설치 중..."
      - curl -sL https://downloads.apache.org/maven/maven-3/3.9.6/binaries/apache-maven-3.9.6-bin.tar.gz | tar -xz
      - mv apache-maven-3.9.6 apache-maven
      - ln -s $(pwd)/apache-maven/bin/mvn /usr/bin/mvn
      - echo "✅ Maven 경로:"
      - which mvn
      - echo "✅ Maven 버전:"
      - mvn -version

  build:
    commands:
      - echo "🚀 프로젝트 빌드 시작!"
      - mvn clean package

artifacts:
  files:
    - target/*.war
  discard-paths: yes
